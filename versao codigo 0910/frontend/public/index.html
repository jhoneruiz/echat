<!DOCTYPE html>
<html lang="es">
  <head>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="apple-touch-startup-image" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="theme-color" content="#3b82f6" />
    <meta
      name="viewport"
      content="minimum-scale=1, initial-scale=1, width=device-width, shrink-to-fit=no, user-scalable=no"
    />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f172a;
      }

      #splash-screen {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.35s ease-out;
      }

      @media (prefers-color-scheme: dark) {
        #splash-screen { background: #0f172a; }
        .splash-text { color: #94a3b8 !important; }
        .splash-bar { background: rgba(148, 163, 184, 0.18) !important; }
        .splash-bar-fill { background: #60a5fa !important; }
        .splash-logo-fallback { color: #f1f5f9 !important; }
      }

      .splash-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
      }

      .splash-logo {
        width: 56px;
        height: 56px;
        animation: splash-pulse 1.6s ease-in-out infinite;
      }

      .splash-logo-fallback {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: #0f172a;
        animation: splash-pulse 1.6s ease-in-out infinite;
      }

      @keyframes splash-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.55; }
      }

      .splash-bar {
        width: 180px;
        height: 3px;
        background: rgba(15, 23, 42, 0.08);
        border-radius: 999px;
        overflow: hidden;
      }

      .splash-bar-fill {
        height: 100%;
        background: #3b82f6;
        border-radius: 999px;
        width: 0;
        transition: width 0.3s ease-out;
      }

      .splash-text {
        font-size: 12px;
        font-weight: 500;
        color: #64748b;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      #splash-screen.fade-out {
        opacity: 0;
      }

      @media (prefers-reduced-motion: reduce) {
        .splash-logo, .splash-logo-fallback { animation: none; }
      }
    </style>
  </head>

  <body>
    <div id="splash-screen">
      <div class="splash-content">
        <img class="splash-logo" src="%PUBLIC_URL%/favicon.png" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
        <div class="splash-logo-fallback" style="display:none">●</div>
        <div class="splash-bar">
          <div class="splash-bar-fill" id="splash-bar-fill"></div>
        </div>
        <div class="splash-text" id="splash-text">Cargando</div>
      </div>
    </div>

    <div id="root"></div>
    <noscript>Necesitas habilitar JavaScript para ejecutar esta aplicación.</noscript>

    <script>
      (function () {
        var fill = document.getElementById('splash-bar-fill');
        var text = document.getElementById('splash-text');
        var progress = 0;
        var done = false;

        var tick = setInterval(function () {
          if (done) return;
          if (progress < 70) progress += Math.random() * 6 + 2;
          else if (progress < 90) progress += Math.random() * 1.5 + 0.5;
          if (progress > 92) progress = 92;
          fill.style.width = progress + '%';
        }, 180);

        function finish() {
          if (done) return;
          done = true;
          clearInterval(tick);
          fill.style.width = '100%';
          if (text) text.textContent = 'Listo';
          setTimeout(function () {
            var s = document.getElementById('splash-screen');
            if (s) {
              s.classList.add('fade-out');
              setTimeout(function () { s.remove(); }, 350);
            }
          }, 200);
        }

        window.finishProgress = finish;
        window.addEventListener('load', function () { setTimeout(finish, 400); });
        setTimeout(finish, 12000);
      })();
    </script>
  </body>
</html>
